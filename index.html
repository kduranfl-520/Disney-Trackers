<link rel="manifest" href="data:application/manifest+json,{"name":"Disney Trackers","short_name":"Disney Trackers","display":"standalone","background_color":"%230f1626","theme_color":"%230f1626","start_url":"."}">
<style>
:root{
  --bg:#0f1626; --bg2:#172238; --card:#1d2a45; --card2:#243454;
  --line:#33446b; --ink:#eef4ff; --mut:#a6b8dc; --dim:#7689b3;
  --gold:#7bb6f0; --gold2:#a9d2ff;
  --teal:#67dac6; --amber:#f0a94e; --grey:#6f7da0;
  --rad:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);
  font-family:'Avenir Next','Segoe UI',system-ui,-apple-system,sans-serif}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left)}
.wrap{max-width:760px;margin:0 auto;padding:0 16px 120px}

header{padding:22px 0 12px;position:relative}
.kicker{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);
  font-weight:700;margin:0 0 4px}
h1{font-size:25px;margin:0;font-weight:800;letter-spacing:-.01em;line-height:1.05}
h1 .spark{color:var(--gold)}

/* dashboard */
.dash{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:7px;margin:12px 0 5px}
.stat{background:linear-gradient(160deg,var(--card),var(--bg2));border:1px solid var(--line);
  border-radius:11px;padding:9px 11px}
.stat .n{font-size:19px;font-weight:800;letter-spacing:-.02em;line-height:1}
.stat .l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-top:3px;font-weight:600}
.stat.hero .n{color:var(--gold)}
.bar{height:5px;border-radius:5px;background:#2a3858;overflow:hidden;margin-top:7px}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:5px;transition:width .5s}
.mini{display:flex;gap:13px;margin:7px 2px 0;font-size:11.5px;color:var(--mut)}
.mini b{color:var(--ink)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:1px}
.dot.max{background:var(--teal)} .dot.lv{background:var(--amber)} .dot.no{background:var(--grey)}

/* tabs */
.gameswitch{display:flex;gap:7px;margin:6px 0 2px}
.gbtn{flex:1;text-align:center;padding:11px 8px;border-radius:12px;font-weight:700;font-size:13px;
  cursor:pointer;border:1px solid var(--line);background:var(--bg2);color:var(--mut);transition:.18s}
.gbtn.on{background:linear-gradient(160deg,var(--gold2),var(--gold));color:#0c1322;border-color:var(--gold);
  box-shadow:0 3px 12px rgba(123,182,240,.30)}
.tabs{display:flex;gap:6px;margin:18px 0 12px;background:var(--bg2);padding:5px;border-radius:13px;border:1px solid var(--line)}
.tab{flex:1;text-align:center;padding:10px;border-radius:9px;font-weight:700;font-size:14px;
  color:var(--mut);cursor:pointer;border:none;background:none;transition:.18s}
.tab.on{background:linear-gradient(160deg,var(--card2),var(--card));color:var(--ink);
  box-shadow:0 2px 10px rgba(0,0,0,.3)}

/* controls */
.controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search{flex:1;min-width:160px;position:relative}
.search input{width:100%;padding:11px 12px 11px 38px;border-radius:11px;border:1px solid var(--line);
  background:var(--bg2);color:var(--ink);font-size:15px;outline:none}
.search input:focus{border-color:var(--gold)}
.search svg{position:absolute;left:12px;top:11px;width:17px;height:17px;stroke:var(--dim);fill:none;stroke-width:2}
select{padding:11px 12px;border-radius:11px;border:1px solid var(--line);background:var(--bg2);
  color:var(--ink);font-size:14px;outline:none;max-width:48%}
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:7px 13px;border-radius:20px;border:1px solid var(--line);
  background:var(--bg2);color:var(--mut);font-size:13px;font-weight:600;cursor:pointer}
.chip.on{background:var(--gold);color:#0c1322;border-color:var(--gold)}
.clearwrap{position:relative;display:flex;flex:1;min-width:0}
.clearwrap>input{flex:1;min-width:0;padding-right:34px !important}
.clearx{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:22px;height:22px;
  border:none;border-radius:50%;background:var(--line);color:var(--ink);font-size:14px;line-height:1;
  cursor:pointer;display:none;align-items:center;justify-content:center;padding:0}
.clearwrap.has .clearx{display:flex}
.actpill{flex:none;white-space:nowrap;padding:7px 10px;border-radius:20px;border:1px solid var(--line);
  background:var(--bg2);color:var(--mut);font-size:12.5px;font-weight:600;cursor:pointer;outline:none;
  -webkit-appearance:none;appearance:none;text-align:center}
.actpill.on{background:var(--teal);color:#0c1322;border-color:var(--teal)}

/* list */
.group-h{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);
  font-weight:700;margin:16px 2px 7px;display:flex;align-items:center;gap:8px;cursor:pointer;
  user-select:none;-webkit-user-select:none}
.group-h .gtitle{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.group-h .gcount{color:var(--dim);font-weight:600;letter-spacing:.04em}
.group-h .chev{width:14px;height:14px;flex:none;stroke:var(--gold);fill:none;stroke-width:2.4;
  stroke-linecap:round;stroke-linejoin:round;transition:transform .2s}
.group-h.collapsed .chev{transform:rotate(-90deg)}
.collapsebar{display:flex;gap:8px;margin:2px 2px 0}
.collapsebar button{background:none;border:none;color:var(--dim);font-size:12px;font-weight:600;
  cursor:pointer;padding:4px 2px}
.collapsebar button:active{color:var(--ink)}
.row{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);
  border-radius:11px;padding:7px 11px;margin-bottom:5px}
.row.off{opacity:.62}
.row.leveling{background:linear-gradient(160deg,rgba(90,208,192,.14),var(--card));
  border-color:rgba(90,208,192,.45);box-shadow:inset 3px 0 0 var(--teal)}
.row.maxed{background:linear-gradient(160deg,var(--card2),#2a3a5e);
  border-color:#46588c;box-shadow:inset 3px 0 0 var(--gold)}
.row.maxed .nm{color:var(--gold2)}
.check{width:23px;height:23px;border-radius:7px;border:2px solid var(--line);flex:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;background:var(--bg2);transition:.15s}
.check.on{background:var(--gold);border-color:var(--gold)}
.check svg{width:13px;height:13px;stroke:#0c1322;fill:none;stroke-width:3.2;display:none}
.check.on svg{display:block}
.info{flex:1;min-width:0}
.info .nm{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.info .sub{font-size:11px;color:var(--mut);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:11px;font-weight:700;padding:5px 9px;border-radius:8px;flex:none;letter-spacing:.02em}
.b-max{background:rgba(90,208,192,.16);color:var(--teal)}
.b-lv{background:rgba(240,169,78,.16);color:var(--amber)}
.b-no{background:rgba(111,103,136,.18);color:#b3abc9}
.stepper{display:flex;align-items:center;gap:3px;flex:none}
.step{width:27px;height:27px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);
  color:var(--ink);font-size:17px;font-weight:600;line-height:1;cursor:pointer;display:flex;
  align-items:center;justify-content:center;padding:0}
.step:active{background:var(--card2)}
.lvnum{min-width:19px;text-align:center;font-weight:800;font-size:15px;color:var(--gold)}
.lvbtn{height:27px;padding:0 9px;border-radius:8px;border:none;font-weight:700;font-size:11px;cursor:pointer}
.lvbtn.max{background:rgba(123,182,240,.18);color:var(--gold);margin-left:3px}
.lvbtn.unmax{background:rgba(90,208,192,.16);color:var(--teal)}
.lvbtn:active{filter:brightness(1.2)}
.del{flex:none;width:27px;height:27px;margin-left:5px;border-radius:8px;border:1px solid var(--line);
  background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.del svg{width:13px;height:13px;stroke:var(--dim);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.del.armed{background:#7a2230;border-color:#b43a4a}
.del.armed svg{stroke:#ffd9de}
.star{flex:none;width:27px;height:27px;margin-left:5px;border-radius:8px;border:1px solid var(--line);
  background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.star svg{width:15px;height:15px;fill:none;stroke:var(--dim);stroke-width:1.6;stroke-linejoin:round}
.star.on{background:rgba(240,169,78,.16);border-color:var(--amber)}
.star.on svg{fill:var(--amber);stroke:var(--amber)}
.row.fav{border-color:rgba(240,169,78,.5)}
.empty{text-align:center;color:var(--dim);padding:60px 20px;font-size:15px}

/* fab + sheet */
.fab{position:fixed;right:18px;bottom:calc(20px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:18px;
  background:linear-gradient(160deg,var(--gold2),var(--gold));border:none;color:#0c1322;font-size:30px;
  font-weight:300;box-shadow:0 8px 24px rgba(0,0,0,.45);cursor:pointer;z-index:30;display:flex;align-items:center;justify-content:center}
.scrim{position:fixed;inset:0;background:rgba(8,6,14,.6);backdrop-filter:blur(3px);z-index:40;display:none}
.scrim.on{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--bg2);border-top:1px solid var(--line);
  border-radius:22px 22px 0 0;padding:22px 20px calc(28px + env(safe-area-inset-bottom));z-index:50;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.3,1,.4,1);max-width:760px;margin:0 auto}
.sheet.on{transform:translateY(0)}
.sheet h3{margin:0 0 16px;font-size:18px}
.grip{width:38px;height:4px;background:var(--line);border-radius:3px;margin:0 auto 16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--mut);margin-bottom:6px;font-weight:600;letter-spacing:.04em}
.hint{font-size:11.5px;color:var(--dim);margin-top:6px;line-height:1.4}
.suggest{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;max-height:96px;overflow-y:auto}
.suggest button{background:var(--card);border:1px solid var(--line);color:var(--mut);
  font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:16px;cursor:pointer}
.suggest button:active{background:var(--card2);color:var(--ink)}
.toggle{display:flex;gap:8px}
.rolewrap{display:flex;flex-wrap:wrap;gap:7px}
.rolewrap button{background:var(--card);border:1px solid var(--line);color:var(--mut);
  font-size:13px;font-weight:600;padding:8px 12px;border-radius:18px;cursor:pointer}
.rolewrap button.on{background:var(--gold);color:#0c1322;border-color:var(--gold)}
#compFood{width:100%;padding:11px;border-radius:11px;border:1px solid var(--line);
  background:var(--card);color:var(--ink);font-size:15px;outline:none}
#compLoc,#locName{flex:1;min-width:0}
.dayrow{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.daytog{flex:none;width:46px;background:var(--card);border:1px solid var(--line);color:var(--mut);
  font-size:12px;font-weight:700;padding:7px 0;border-radius:9px;cursor:pointer}
.daytog.on{background:var(--gold);color:#0c1322;border-color:var(--gold)}
.allbtn{flex:none;background:var(--card);border:1px solid var(--line);color:var(--mut);
  font-size:11.5px;font-weight:600;padding:7px 9px;border-radius:9px;cursor:pointer}
.allbtn.on{background:var(--teal);color:#0c1322;border-color:var(--teal)}
.allbtn:disabled{opacity:.35}
.rangewrap{display:flex;align-items:center;gap:4px;flex:1;min-width:0}
.rangewrap.dim{opacity:.3}
.hsel{flex:1;min-width:0;padding:7px 4px;border-radius:8px;border:1px solid var(--line);
  background:var(--card);color:var(--ink);font-size:12.5px;outline:none}
.dash{color:var(--dim);font-size:13px}
.schedadd{display:flex;gap:6px;margin-top:9px;align-items:stretch}
.schedadd input{flex:1;min-width:0;padding:11px;border-radius:11px;border:1px solid var(--line);
  background:var(--card);color:var(--ink);font-size:15px;outline:none}
.schedadd select{padding:11px;border-radius:11px;border:1px solid var(--line);background:var(--card);
  color:var(--ink);font-size:14px;outline:none}
#schedLoc{flex:1;min-width:0}
.schedbtn{flex:none;padding:0 16px}
.schedrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
  border-radius:11px;padding:9px 12px;margin-bottom:6px}
.schedrow .stime{flex:none;min-width:62px;font-size:13px;color:var(--gold2);font-weight:700}
.schedrow .sloc{flex:1;font-weight:600;font-size:14px}
.schedrow .srm{flex:none;width:26px;height:26px;border-radius:8px;border:1px solid var(--line);
  background:var(--bg2);color:var(--dim);cursor:pointer;font-size:16px;line-height:1;padding:0}
.schedempty{font-size:12.5px;color:var(--dim);padding:4px 2px}
.editdot{font-size:11px;color:var(--gold);opacity:.7;margin-left:3px}
.dgroup.hide{display:none}
.qbadge{flex:none;min-width:26px;text-align:center;font-weight:700;font-size:13px;color:var(--gold2);
  background:var(--bg2);border:1px solid var(--line);border-radius:7px;padding:3px 6px}
.tg{flex:1;padding:12px;border-radius:11px;border:1px solid var(--line);background:var(--card);
  color:var(--mut);font-size:15px;font-weight:700;cursor:pointer}
.tg.on{background:var(--gold);color:#0c1322;border-color:var(--gold)}
.field input{width:100%;padding:12px;border-radius:11px;border:1px solid var(--line);background:var(--card);
  color:var(--ink);font-size:16px;outline:none}
.field input:focus{border-color:var(--gold)}
.field input[list]::-webkit-calendar-picker-indicator{filter:invert(.6)}
.actions{display:flex;gap:10px;margin-top:8px}
.btn{flex:1;padding:13px;border-radius:12px;border:none;font-weight:700;font-size:15px;cursor:pointer}
.btn.p{background:var(--gold);color:#0c1322}
.btn.s{background:var(--card);color:var(--ink);border:1px solid var(--line)}

/* data menu */
.tools{display:flex;gap:8px;margin:14px 0 2px}
.syncinfo{font-size:11.5px;color:var(--dim);margin:2px 2px 8px;text-align:center}
.backupwarn{font-size:12.5px;line-height:1.4;background:rgba(240,169,78,.14);border:1px solid var(--amber);color:var(--amber);border-radius:12px;padding:9px 12px;margin:0 2px 10px;text-align:center}
.backupwarn b{color:var(--amber)}
.tool{flex:1;padding:10px;border-radius:11px;border:1px solid var(--line);background:var(--bg2);
  color:var(--mut);font-size:12.5px;font-weight:600;cursor:pointer;text-align:center}
.toast{position:fixed;left:50%;bottom:calc(90px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
  background:var(--card2);color:var(--ink);padding:11px 18px;border-radius:12px;border:1px solid var(--line);
  font-size:14px;font-weight:600;opacity:0;transition:.3s;z-index:60;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.4)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="kicker" id="kicker">Disney Magic Kingdoms</p>
    <h1>Collection <span class="spark">Tracker</span></h1>
  </header>

  <div class="gameswitch" id="gameswitch"></div>

  <div class="dash" id="dash"></div>
  <div class="mini" id="mini"></div>

  <div class="tabs" id="tabs"></div>

  <div class="controls">
    <div class="search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" placeholder="Search by name…" autocomplete="off">
    </div>
  </div>
  <div class="chips" id="chips"></div>
  <div class="collapsebar">
    <button id="collapseAll">Collapse all</button>
    <button id="expandAll">Expand all</button>
  </div>

  <div id="list"></div>

  <div id="backupWarn" class="backupwarn" style="display:none"></div>
  <div class="tools">
    <button class="tool" id="sync">⟳ Sync new content</button>
    <button class="tool" id="exp">⤓ Export backup</button>
    <button class="tool" id="imp">⤒ Import backup</button>
    <button class="tool" id="restore">↩ Restore auto-backup</button>
    <button class="tool" id="rst">↺ Reset to original</button>
  </div>
  <div id="syncinfo" class="syncinfo"></div>
  <input type="file" id="file" accept=".json" hidden>
</div>

<button class="fab" id="fab">+</button>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grip"></div>
  <h3 id="sheetTitle">Add a character</h3>
  <div class="field"><label>Name</label>
    <input id="addName" type="text" placeholder="e.g. Mickey Mouse" autocomplete="off"></div>
  <div class="field"><label>Category (film / world)</label>
    <input id="addCat" type="text" placeholder="Type a movie name" autocomplete="off">
    <div class="hint">Type any movie. New names create a new category.</div>
    <div class="suggest" id="catSuggest"></div></div>
  <div class="field" id="addExpField"><label>Source (expansion)</label>
    <select id="addExp">
      <option value="Dreamlight Valley">Dreamlight Valley</option>
      <option value="Eternity Isle">Eternity Isle</option>
      <option value="Storybook Vale">Storybook Vale</option>
      <option value="Wishblossom Ranch">Wishblossom Ranch</option>
      <option value="Honeyglow Woods">Honeyglow Woods</option>
    </select></div>
  <div class="field"><label>Owned?</label>
    <div class="toggle" id="ownToggle">
      <button type="button" class="tg on" data-own="no">Not yet</button>
      <button type="button" class="tg" data-own="yes">Owned</button>
    </div></div>
  <div class="actions">
    <button class="btn s" id="cancel">Cancel</button>
    <button class="btn p" id="save">Add</button>
  </div>
</div>

<div class="scrim" id="dscrim"></div>
<div class="sheet" id="dsheet">
  <div class="grip"></div>
  <h3 id="dTitle">Details</h3>

  <!-- Source (expansion) -->
  <div class="field dgroup" id="g_exp"><label>Source (expansion)</label>
    <select id="editExp">
      <option value="Dreamlight Valley">Dreamlight Valley</option>
      <option value="Eternity Isle">Eternity Isle</option>
      <option value="Storybook Vale">Storybook Vale</option>
      <option value="Wishblossom Ranch">Wishblossom Ranch</option>
      <option value="Honeyglow Woods">Honeyglow Woods</option>
    </select></div>

  <!-- Character: role -->
  <div class="field dgroup" id="g_role"><label>Role</label>
    <div class="rolewrap" id="roleWrap"></div></div>

  <!-- Character: schedule -->
  <div class="field dgroup" id="g_sched">
    <label>Daily schedule</label>
    <div id="schedList"></div>
    <div class="schedadd">
      <select id="schedTime" style="max-width:118px">
        <option value="">Hour…</option>
        <option value="00">12 AM</option><option value="01">1 AM</option><option value="02">2 AM</option>
        <option value="03">3 AM</option><option value="04">4 AM</option><option value="05">5 AM</option>
        <option value="06">6 AM</option><option value="07">7 AM</option><option value="08">8 AM</option>
        <option value="09">9 AM</option><option value="10">10 AM</option><option value="11">11 AM</option>
        <option value="12">12 PM</option><option value="13">1 PM</option><option value="14">2 PM</option>
        <option value="15">3 PM</option><option value="16">4 PM</option><option value="17">5 PM</option>
        <option value="18">6 PM</option><option value="19">7 PM</option><option value="20">8 PM</option>
        <option value="21">9 PM</option><option value="22">10 PM</option><option value="23">11 PM</option>
      </select>
      <select id="schedLoc"></select>
      <button class="btn p schedbtn" id="schedAdd">Add</button>
    </div>
  </div>

  <!-- Companion: level 1-5 -->
  <div class="field dgroup" id="g_complevel"><label>Level</label>
    <div class="rolewrap" id="compLevelWrap"></div></div>

  <!-- Companion: favorite food -->
  <div class="field dgroup" id="g_food"><label>Favorite food</label>
    <input id="compFood" type="text" placeholder="e.g. Wild Mushroom" autocomplete="off"></div>

  <!-- Companion: location -->
  <div class="field dgroup" id="g_comploc"><label>Location</label>
    <div id="compLocList"></div>
    <div class="schedadd">
      <select id="compLoc"></select>
      <button class="btn p schedbtn" id="compLocAdd">Add</button>
    </div></div>

  <!-- Companion: per-day availability -->
  <div class="field dgroup" id="g_days"><label>Availability by day</label>
    <div id="daysWrap"></div></div>

  <!-- Recipe: ingredients -->
  <div class="field dgroup" id="g_ingr">
    <label>Ingredients</label>
    <div id="ingrList"></div>
    <div class="schedadd">
      <input id="ingrQty" type="text" inputmode="numeric" placeholder="Qty" autocomplete="off" style="max-width:64px">
      <input id="ingrName" type="text" placeholder="Ingredient" autocomplete="off">
      <button class="btn p schedbtn" id="ingrAdd">Add</button>
    </div>
  </div>

  <!-- Collectible: where found -->
  <div class="field dgroup" id="g_loc">
    <label>Where to find</label>
    <div id="locList"></div>
    <div class="schedadd">
      <select id="locName"></select>
      <button class="btn p schedbtn" id="locAdd">Add</button>
    </div>
  </div>

  <div class="actions">
    <button class="btn s" id="dClose">Done</button>
  </div>
</div>

<div class="toast" id="toast"></div>

function freshDB(){
  const d={};
  GAME_ORDER.forEach(g=>{ d[g]=JSON.parse(JSON.stringify(GAMES[g].data)); });
  return d;
}
function load(){
  // v3: collectibles were restructured. Migrate from v2 once, preserving prior progress
  // for everything except DDV collectibles (which take the corrected built-in list).
  try{const s=localStorage.getItem(KEY); if(s){const d=JSON.parse(s);
    GAME_ORDER.forEach(g=>{ if(!d[g]) d[g]=JSON.parse(JSON.stringify(GAMES[g].data)); });
    // ensure each section exists; if a section is missing, seed it from built-in
    GAME_ORDER.forEach(g=>{
      GAMES[g].sections.forEach(([sec])=>{ if(!Array.isArray(d[g][sec])) d[g][sec]=JSON.parse(JSON.stringify(GAMES[g].data[sec]||[])); });
    });
    // one-time cleanup: mounts moved from a 'Mounts' category into their movie categories.
    // Carry over any owned/level progress, then drop the stale 'Mounts' rows.
    try{ if(Array.isArray(d.dreamlight && d.dreamlight.characters)){
      const moviemap={Maximus:'Tangled',Khan:'Mulan',Pegasus:'Hercules',Sven:'Frozen','Customizable Horse':'Dreamlight Valley'};
      const chars=d.dreamlight.characters;
      chars.filter(c=>c.category==='Mounts').forEach(old=>{
        const target=moviemap[old.name]; if(!target) return;
        let dest=chars.find(c=>c.name===old.name && c.category===target);
        if(dest){ // copy progress forward if the user had any
          if(old.owned){ dest.owned=old.owned; dest.level=old.level; dest.timer=old.timer; dest.status=old.status; dest.role=old.role||dest.role; dest.schedule=old.schedule||dest.schedule; }
        } else {
          old.category=target; // no built-in dest yet; just relabel
        }
      });
      d.dreamlight.characters=chars.filter(c=>c.category!=='Mounts');
    }}catch(e){}
    // merge in any NEW built-in items (by name+category) added in later versions,
    // without disturbing the user's existing progress
    GAME_ORDER.forEach(g=>{
      GAMES[g].sections.forEach(([sec])=>{
        const builtin=GAMES[g].data[sec]||[];
        const have=new Set(d[g][sec].map(it=>it.name+'|'+it.category));
        builtin.forEach(it=>{ if(!have.has(it.name+'|'+it.category)) d[g][sec].push(JSON.parse(JSON.stringify(it))); });
      });
    });
    // one-time: apply built-in character schedules to existing saves (schedule data added in this version)
    try{
      if(localStorage.getItem('mkt_sched_v1')!=='done' && d.dreamlight && Array.isArray(d.dreamlight.characters)){
        const builtinChars=(GAMES.dreamlight.data.characters||[]);
        d.dreamlight.characters.forEach(c=>{
          const bi=builtinChars.find(b=>b.name===c.name && b.category===c.category);
          if(bi && Array.isArray(bi.schedule) && bi.schedule.length){
            c.schedule=JSON.parse(JSON.stringify(bi.schedule));
          }
        });
        localStorage.setItem('mkt_sched_v1','done');
      }
    }catch(e){}
    // one-time: apply built-in companion locations + time windows to existing saves
    try{
      if(localStorage.getItem('mkt_compsched_v1')!=='done' && d.dreamlight && Array.isArray(d.dreamlight.collectibles)){
        const builtinCol=(GAMES.dreamlight.data.collectibles||[]);
        d.dreamlight.collectibles.forEach(c=>{
          if(c.category!=='Companions') return;
          const bi=builtinCol.find(b=>b.category==='Companions' && b.name===c.name);
          if(bi){
            if(Array.isArray(bi.locs)) c.locs=JSON.parse(JSON.stringify(bi.locs));
            if(Array.isArray(bi.schedule)) c.schedule=JSON.parse(JSON.stringify(bi.schedule));
          }
        });
        localStorage.setItem('mkt_compsched_v1','done');
      }
    }catch(e){}
    // one-time: tag recipes/characters/collectibles with their expansion source (added this version)
    try{
      if(localStorage.getItem('mkt_recipexp_v1')!=='done' && d.dreamlight){
        const tag=(arr,builtin)=>{
          if(!Array.isArray(arr)||!Array.isArray(builtin)) return;
          arr.forEach(it=>{
            if(it.expansion) return;
            const bi=builtin.find(b=>b.name===it.name && b.category===it.category);
            if(bi && bi.expansion) it.expansion=bi.expansion;
          });
        };
        tag(d.dreamlight.recipes, GAMES.dreamlight.data.recipes||[]);
        tag(d.dreamlight.characters, GAMES.dreamlight.data.characters||[]);
        tag(d.dreamlight.collectibles, GAMES.dreamlight.data.collectibles||[]);
        localStorage.setItem('mkt_recipexp_v1','done');
      }
    }catch(e){}
    return d;}}catch(e){}
  // first run on v3: try migrating the old v2 save
  try{const old=localStorage.getItem('mkt_data_v2'); if(old){const o=JSON.parse(old);
    const fresh=freshDB();
    // carry over Magic Kingdoms fully
    if(o.magic_kingdoms) fresh.magic_kingdoms=o.magic_kingdoms;
    // carry over DDV characters + recipes (keep owned/level/role/schedule); collectibles stay fresh
    if(o.dreamlight){
      if(Array.isArray(o.dreamlight.characters)) fresh.dreamlight.characters=o.dreamlight.characters;
      if(Array.isArray(o.dreamlight.recipes)) fresh.dreamlight.recipes=o.dreamlight.recipes;
    }
    return fresh;}}catch(e){}
  return freshDB();
}
function save(){ try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){} autoSnapshot(); markDirty(); }

/* ---- Layer 1: rolling in-app auto-backup snapshots ---- */
const SNAPKEY='mkt_snapshots_v1';   // array of {at, label, data}
const DIRTYKEY='mkt_dirty_v1';      // ISO time of last change since last export
const MAX_SNAPS=8;                  // keep this many recent snapshots
let _snapTimer=null;
function autoSnapshot(){
  // debounce so a burst of edits writes at most one snapshot per ~2.5s
  if(_snapTimer) return;
  _snapTimer=setTimeout(()=>{
    _snapTimer=null;
    try{
      const now=new Date();
      let arr=[]; try{arr=JSON.parse(localStorage.getItem(SNAPKEY))||[];}catch(e){arr=[];}
      // skip if identical to the newest snapshot (no real change)
      const snapshot=JSON.stringify(DB);
      if(arr.length && arr[arr.length-1]._h===snapshot.length && JSON.stringify(arr[arr.length-1].data)===snapshot){ return; }
      arr.push({at:now.toISOString(), label:stamp(now), _h:snapshot.length, data:JSON.parse(snapshot)});
      while(arr.length>MAX_SNAPS) arr.shift();
      localStorage.setItem(SNAPKEY, JSON.stringify(arr));
    }catch(e){/* storage full or unavailable — fail quietly */}
  }, 2500);
}
function markDirty(){
  try{
    const exp=localStorage.getItem('mkt_last_export');
    // dirty = there have been changes; record the time of the latest change
    localStorage.setItem(DIRTYKEY, new Date().toISOString());
  }catch(e){}
}
function hasUnsavedChanges(){
  try{
    const dirty=localStorage.getItem(DIRTYKEY);
    const exp=localStorage.getItem('mkt_last_export');
    if(!dirty) return false;
    if(!exp) return true;                       // never exported but has changes
    return new Date(dirty) > new Date(exp);      // changed since last export
  }catch(e){ return false; }
}
function getSnapshots(){
  try{ return JSON.parse(localStorage.getItem(SNAPKEY))||[]; }catch(e){ return []; }
}
function loadUI(){ try{const s=localStorage.getItem(UIKEY); return s?JSON.parse(s):null;}catch(e){return null;} }
function saveUI(){ try{ tabState[tabKey()]={chip,cat:window._cat||'',q,actChip,lvlChip,expChip};
  localStorage.setItem(UIKEY,JSON.stringify(
  {game,view,q,chip,actChip,cat:window._cat||'',collapsed,schedLocations,compLocations,extraLocations,tabState}));}catch(e){} }
function items(){ return DB[game][view]; }
function colMap(){ collapsed[game]=collapsed[game]||{}; collapsed[game][view]=collapsed[game][view]||{}; return collapsed[game][view]; }

function statusOf(it){
  if(!it.owned) return 'Not owned';
  if(!hasLevels()) return 'Done';      // sections without levels: owned = done
  if(it.level==='MAX') return 'Maxed';
  return 'Leveling';
}
function recompute(it){ it.status=statusOf(it); }

/* level -> upgrade timer ladders come from the active game's config */
function ladder(){ return (GAMES[game].levels && GAMES[game].levels[view]) || []; }
function hasLevels(){ return ladder().length>0; }
function maxLevel(){ return ladder().length; }              // top numeric level before MAX
function timerForLevel(n){                                   // timer shown while AT level n
  const lad=ladder();
  if(!lad.length) return '';
  if(n<=0) return lad[0];
  if(n>=lad.length) return '';        // MAX has no timer
  return lad[n];
}
function ddvCharNow(){ return game==='dreamlight' && view==='characters'; }
function setLevel(it,n){
  const top=maxLevel();
  const noTimer = ddvCharNow();   // friendship levels have no timer text
  if(n>=top){ it.level='MAX'; it.timer=''; }
  else if(n<0){ it.level='0'; it.timer=noTimer?'':timerForLevel(0); }
  else { it.level=String(n); it.timer=noTimer?'':timerForLevel(n); }
  recompute(it);
}
function curNum(it){                                         // numeric level, MAX -> top
  if(it.level==='MAX') return maxLevel();
  const n=parseInt(it.level,10);
  return isNaN(n)?0:n;
}

/* ---------- render ---------- */
function render(){
  const all=items();
  // dashboard
  const total=all.length, owned=all.filter(x=>x.owned).length;
  const maxed=all.filter(x=>statusOf(x)==='Maxed').length;
  const leveling=all.filter(x=>statusOf(x)==='Leveling').length;
  const tounlock=total-owned;
  const pct= total? Math.round(owned/total*100):0;
  dash.innerHTML=`
    <div class="stat hero"><div class="n">${pct}%</div><div class="l">Collected</div>
      <div class="bar"><i style="width:${pct}%"></i></div></div>
    <div class="stat"><div class="n">${owned}</div><div class="l">Owned</div></div>
    <div class="stat"><div class="n">${total}</div><div class="l">Total</div></div>`;
  mini.innerHTML = hasLevels()
    ? `<span><i class="dot max"></i>Maxed <b>${maxed}</b></span>
       <span><i class="dot lv"></i>Leveling <b>${leveling}</b></span>
       <span><i class="dot no"></i>To get <b>${tounlock}</b></span>`
    : `<span><i class="dot max"></i>Done <b>${owned}</b></span>
       <span><i class="dot no"></i>To get <b>${tounlock}</b></span>`;

  // category options (used by the category pill in the chip row)
  const cats=[...new Set(all.map(x=>x.category))].sort();
  // safety: if a saved category filter no longer exists in this tab, clear it so the user isn't stuck
  if(window._cat && !cats.includes(window._cat)){ window._cat=''; saveUI(); }
  window._catOpts=cats;

  // filtered
  let rows=all.filter(x=>{
    if(window._cat && x.category!==window._cat) return false;
    if(q && !x.name.toLowerCase().includes(q)) return false;
    const st=statusOf(x);
    if(chip==='fav' && !x.fav) return false;
    if(chip==='owned' && !x.owned) return false;
    if(chip==='missing' && x.owned) return false;
    if(chip==='leveling' && st!=='Leveling') return false;
    if(actChip && game==='dreamlight' && view==='characters' && (x.role||'')!==actChip) return false;
    if(expChip && game==='dreamlight' && (x.expansion||'')!==expChip) return false;
    if(lvlChip && hasLevels()){
      if(!x.owned) return false;
      if(lvlChip==='MAX'){ if(x.level!=='MAX') return false; }
      else { if(x.level==='MAX' || String(curNum(x))!==lvlChip) return false; }
    }
    return true;
  });

  if(!rows.length){ list.innerHTML=`<div class="empty">Nothing matches.<br>Try clearing filters or search.</div>`; return; }

  // group by category
  const groups={};
  rows.forEach(r=>{(groups[r.category]=groups[r.category]||[]).push(r);});
  let html='';
  const CAT_ORDER = (GAMES[game].order && GAMES[game].order[view]) || null;
  const orderedKeys = Object.keys(groups).sort((a,b)=>{
    if(CAT_ORDER){
      const ia=CAT_ORDER.indexOf(a), ib=CAT_ORDER.indexOf(b);
      if(ia!==-1 || ib!==-1){ return (ia===-1?999:ia)-(ib===-1?999:ib); }
    }
    return a.localeCompare(b);
  });
  orderedKeys.forEach(g=>{
    const gi=groups[g];
    const o=gi.filter(x=>x.owned).length;
    const isCol=!!colMap()[g];
    html+=`<div class="group-h ${isCol?'collapsed':''}" data-grp="${esc(g)}">
      <svg class="chev" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      <span class="gtitle">${esc(g)}</span><span class="gcount">${o}/${gi.length}</span></div>`;
    if(isCol) return;
    gi.sort((a,b)=>a.name.localeCompare(b.name)).forEach(it=>{
      const st=statusOf(it);
      const lv=hasLevels();
      const ddv = (game==='dreamlight');
      const ddvChar = (ddv && view==='characters');
      const isComp = (ddv && view==='collectibles' && it.category==='Companions');
      const isRecipe = (ddv && view==='recipes');
      const isOtherCol = (ddv && view==='collectibles' && it.category!=='Companions');
      let sub;
      if(isRecipe){
        // recipe: show expansion source + ingredient count
        const n=(it.ingredients&&it.ingredients.length)||0;
        const src = it.expansion ? it.expansion : '';
        const cnt = n? n+' ingredient'+(n>1?'s':'') : '';
        sub = [src,cnt].filter(Boolean).join(' · ') || 'Recipe';
      } else if(!it.owned){
        sub = it.unlock? 'Unlock: '+it.unlock : 'Not yet unlocked';
      } else if(ddvChar){
        const fl = it.level==='MAX'?'10':(it.level||'0');
        const role = it.role ? ' · '+it.role : '';
        const sched = (it.schedule&&it.schedule.length)? ' · 🗓 '+it.schedule.length : '';
        sub = `Friendship ${fl}${role}${sched}`;
      } else if(isComp){
        const cl = it.compLevel? 'Lv '+it.compLevel : 'Collected';
        const nDays = it.dayTimes? Object.keys(it.dayTimes).length : (it.days?it.days.length:0);
        const dn = nDays? ' · '+nDays+'d' : '';
        const food = it.food? ' · 🍎 '+it.food : '';
        const nLoc = Array.isArray(it.locs)? it.locs.length : (it.loc?1:0);
        const loc = nLoc? ' · 📍'+nLoc : '';
        sub = cl+dn+food+loc;
      } else if(isOtherCol){
        const n=(it.locations&&it.locations.length)||0;
        sub = n? '📍 '+n+' location'+(n>1?'s':'') : 'Collected';
      } else if(!lv){
        sub = 'Collected';
      } else {
        sub = it.level==='MAX'?'Maxed out'
            : it.level? `Level ${it.level}${it.timer&&it.timer!=='—'?' · '+it.timer:''}`
            : (it.timer==='—'?'No upgrades':'Owned');
      }
      // prepend expansion source on DDV character & collectible tabs (recipes already include it)
      if(ddv && !isRecipe && it.expansion){
        const abbr={'Dreamlight Valley':'Valley','Eternity Isle':'Eternity Isle','Storybook Vale':'Storybook Vale','Wishblossom Ranch':'Wishblossom','Honeyglow Woods':'Honeyglow'};
        sub = (abbr[it.expansion]||it.expansion) + ' · ' + sub;
      }
      const id=it.name+'|'+it.category;
      let ctrl;
      if(!it.owned){
        ctrl=`<div class="badge b-no">${lv?'Locked':'Missing'}</div>`;
      } else if(!lv){
        ctrl=`<div class="badge b-max">Done</div>`;
      } else if(it.level==='MAX'){
        ctrl=`<button class="lvbtn unmax" data-act="unmax" data-id="${esc(id)}">${ddvChar?'−':'Un-max'}</button>`;
      } else {
        const n=curNum(it);
        ctrl=`<div class="stepper">
          <button class="step" data-act="dec" data-id="${esc(id)}">−</button>
          <span class="lvnum">${n}</span>
          <button class="step" data-act="inc" data-id="${esc(id)}">+</button>
          <button class="lvbtn max" data-act="max" data-id="${esc(id)}">${ddvChar?'10':'Max'}</button>
        </div>`;
      }
      const rowCls = it.level==='MAX'?'maxed':(it.owned?(lv?'leveling':'maxed'):'');
      const editable = ddv;  // every DDV card is tappable to edit
      const infoTap = editable ? `data-edit="${esc(id)}"` : '';
      html+=`<div class="row ${it.owned?'':'off'} ${rowCls} ${it.fav?'fav':''}">
        <div class="check ${it.owned?'on':''}" data-id="${esc(id)}">
          <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
        <div class="info" ${infoTap}><div class="nm">${esc(it.name)}${editable?' <span class="editdot">✎</span>':''}</div><div class="sub">${esc(sub)}</div></div>
        <button class="star ${it.fav?'on':''}" data-fav="${esc(id)}" aria-label="Favorite">
          <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 6 6.6.9-4.8 4.6 1.2 6.5L12 21.4 6.1 24.5l1.2-6.5L2.5 9.4l6.6-.9z"/></svg></button>
        ${ctrl}
        <button class="del" data-del="${esc(id)}" aria-label="Delete">
          <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>
      </div>`;
    });
  });
  list.innerHTML=html;
  document.querySelectorAll('.check').forEach(c=>c.onclick=()=>toggle(c.dataset.id));
  document.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>levelAct(b.dataset.act,b.dataset.id));
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>delItem(b,b.dataset.del));
  document.querySelectorAll('[data-fav]').forEach(b=>b.onclick=()=>favToggle(b.dataset.fav));
  document.querySelectorAll('[data-edit]').forEach(el=>el.onclick=()=>openDetail(el.dataset.edit));
  document.querySelectorAll('[data-grp]').forEach(h=>h.onclick=()=>{
    const g=h.dataset.grp; const m=colMap(); m[g]=!m[g]; saveUI(); render();
  });
}
function esc(s){return (s+'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

function toggle(id){
  const [nm,c]=id.split('|');
  const it=items().find(x=>x.name===nm && x.category===c);
  if(!it) return;
  it.owned=!it.owned;
  if(it.owned && hasLevels() && !it.level) setLevel(it,0);
  recompute(it); save(); render();
}
function favToggle(id){
  const [nm,c]=id.split('|');
  const it=items().find(x=>x.name===nm && x.category===c);
  if(!it) return;
  it.fav=!it.fav; save(); render();
}

function levelAct(act,id){
  const [nm,c]=id.split('|');
  const it=items().find(x=>x.name===nm && x.category===c);
  if(!it) return;
  if(act==='inc') setLevel(it,curNum(it)+1);
  else if(act==='dec') setLevel(it,curNum(it)-1);
  else if(act==='max'){ it.level='MAX'; it.timer=''; recompute(it); }
  else if(act==='unmax') setLevel(it, maxLevel()-1);
  save(); render();
}

let _armed=null, _armT=null;
function delItem(btn,id){
  if(_armed===id){            // second tap -> delete
    clearTimeout(_armT); _armed=null;
    const [nm,c]=id.split('|');
    const arr=items();
    const i=arr.findIndex(x=>x.name===nm && x.category===c);
    if(i>-1){ const removed=arr[i].name; arr.splice(i,1); save(); render(); toast('Deleted '+removed); }
    return;
  }
  _armed=id;                  // first tap -> arm
  btn.classList.add('armed');
  toast('Tap trash again to delete');
  clearTimeout(_armT);
  _armT=setTimeout(()=>{ _armed=null; const b=document.querySelector('.del.armed'); if(b)b.classList.remove('armed'); },2500);
}

/* ---------- chips ---------- */
function drawChips(){
  const chip_html=(k,l)=>`<button class="chip ${chip===k?'on':''}" data-c="${k}">${l}</button>`;
  // build the level pill (if this tab has levels)
  let lvlHtml='';
  if(hasLevels()){
    const lad=ladder();
    const lvlOpts=[['','Level ▾']];
    lad.forEach((_,i)=>{ lvlOpts.push([String(i), 'Level '+i]); });
    lvlOpts.push(['MAX','Maxed']);
    if(!lvlOpts.some(o=>o[0]===lvlChip)) lvlChip='';
    lvlHtml=`<select class="actpill lvlpill ${lvlChip?'on':''}" id="lvlpill">`
      + lvlOpts.map(([k,l])=>`<option value="${esc(k)}" ${lvlChip===k?'selected':''}>${esc(l)}</option>`).join('')
      + `</select>`;
  } else { lvlChip=''; }
  // build the category pill (from the current tab's categories)
  const cats=[...new Set(items().map(x=>x.category))].sort();
  if(window._cat && !cats.includes(window._cat)){ window._cat=''; }
  const catHtml=`<select class="actpill catpill ${window._cat?'on':''}" id="catpill">`
    + `<option value="">Category ▾</option>`
    + cats.map(c=>`<option value="${esc(c)}" ${c===window._cat?'selected':''}>${esc(c)}</option>`).join('')
    + `</select>`;
  // validity: ensure chip is a real option
  const validChips=['all','fav','owned','missing'];
  if(!validChips.includes(chip)) chip='all';
  // order: All, Favorites, Owned, [Level pill], [Category pill], Missing
  let html = chip_html('all','All') + chip_html('fav','★ Favorites') + chip_html('owned','Owned');
  html += lvlHtml;
  html += catHtml;
  html += chip_html('missing','Missing');
  // activity pill (DDV characters only) goes after
  const showAct = (game==='dreamlight' && view==='characters');
  if(showAct){
    const opts=[['','Activity ▾'],...ROLES.map(r=>[r,r])];
    if(!opts.some(o=>o[0]===actChip)) actChip='';
    html+=`<select class="actpill ${actChip?'on':''}" id="actpill">`
      + opts.map(([k,l])=>`<option value="${esc(k)}" ${actChip===k?'selected':''}>${esc(l)}</option>`).join('')
      + `</select>`;
  } else { actChip=''; }
  // expansion pill (all DDV tabs)
  const showExp = (game==='dreamlight');
  if(showExp){
    const opts=[['','Source ▾'],['Dreamlight Valley','Dreamlight Valley'],['Eternity Isle','Eternity Isle'],['Storybook Vale','Storybook Vale'],['Wishblossom Ranch','Wishblossom Ranch'],['Honeyglow Woods','Honeyglow Woods']];
    if(!opts.some(o=>o[0]===expChip)) expChip='';
    html+=`<select class="actpill ${expChip?'on':''}" id="exppill">`
      + opts.map(([k,l])=>`<option value="${esc(k)}" ${expChip===k?'selected':''}>${esc(l)}</option>`).join('')
      + `</select>`;
  } else { expChip=''; }
  chips.innerHTML=html;
  chips.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{chip=b.dataset.c;saveUI();render();drawChips();});
  const cp=document.getElementById('catpill');
  if(cp) cp.onchange=()=>{ window._cat=cp.value; saveUI(); render(); drawChips(); };
  const ap=document.getElementById('actpill');
  if(ap) ap.onchange=()=>{ actChip=ap.value; saveUI(); render(); drawChips(); };
  const ep=document.getElementById('exppill');
  if(ep) ep.onchange=()=>{ expChip=ep.value; saveUI(); render(); drawChips(); };
  const lp=document.getElementById('lvlpill');
  if(lp) lp.onchange=()=>{ lvlChip=lp.value; saveUI(); render(); drawChips(); };
}

/* ---------- events ---------- */
/* add an × clear button to a free-text input */
function attachClear(id){
  const input=document.getElementById(id);
  if(!input || input.dataset.clearable) return;
  input.dataset.clearable='1';
  const wrap=document.createElement('span');
  wrap.className='clearwrap';
  input.parentNode.insertBefore(wrap, input);
  wrap.appendChild(input);
  const btn=document.createElement('button');
  btn.type='button'; btn.className='clearx'; btn.setAttribute('aria-label','Clear'); btn.textContent='×';
  wrap.appendChild(btn);
  const sync=()=>wrap.classList.toggle('has', !!input.value);
  input.addEventListener('input', sync);
  btn.addEventListener('click', ()=>{
    input.value='';
    input.dispatchEvent(new Event('input',{bubbles:true}));
    sync(); input.focus();
  });
  sync();
}
['q','addName','addCat','compFood','ingrName'].forEach(attachClear);

/* ---------- character detail editor (DDV) ---------- */
const ROLES=['Gardening','Fishing','Mining','Digging','Foraging','Timebending','Snippet Catching'];
const DAYS=[['MO','Mon'],['TU','Tue'],['WE','Wed'],['TH','Thu'],['FR','Fri'],['SA','Sat'],['SU','Sun']];
const BIOMES=['The Plaza','Peaceful Meadow','Dazzle Beach','Forest of Valor','Glade of Trust','Sunlit Plateau','Frosted Heights','Forgotten Lands','Eternity Isle','Storybook Vale','Wishblossom Mountains'];
const dscrim=document.getElementById('dscrim'), dsheet=document.getElementById('dsheet');
let _editItem=null;
function showGroup(id,on){ document.getElementById(id).classList.toggle('hide',!on); }
function openDetail(id){
  const [nm,c]=id.split('|');
  const it=items().find(x=>x.name===nm && x.category===c);
  if(!it) return;
  _editItem=it;
  document.getElementById('dTitle').textContent=nm;

  const isChar = (game==='dreamlight' && view==='characters');
  const isComp = (game==='dreamlight' && view==='collectibles' && c==='Companions');
  const isRecipe = (game==='dreamlight' && view==='recipes');
  const isOtherCol = (game==='dreamlight' && view==='collectibles' && c!=='Companions');

  // toggle visible groups
  showGroup('g_role', isChar);
  showGroup('g_sched', isChar);
  showGroup('g_complevel', isComp);
  showGroup('g_food', isComp);
  showGroup('g_comploc', isComp);
  showGroup('g_days', isComp);
  showGroup('g_ingr', isRecipe);
  showGroup('g_loc', isOtherCol);
  // Source applies to all DDV items
  const isDDV = (game==='dreamlight');
  showGroup('g_exp', isDDV);
  if(isDDV){
    const ee=document.getElementById('editExp');
    if(!it.expansion) it.expansion='Dreamlight Valley';
    ee.value=it.expansion;
    ee.onchange=()=>{ _editItem.expansion=ee.value; save(); };
  }

  // ensure fields exist
  if(isChar && !it.schedule) it.schedule=[];
  if(isComp){
    if(it.compLevel===undefined) it.compLevel='';
    if(it.food===undefined) it.food='';
    if(!Array.isArray(it.locs)){
      it.locs = (it.loc && typeof it.loc==='string') ? [it.loc] : [];  // migrate old single string
      delete it.loc;
    }
    if(!it.dayTimes){
      it.dayTimes={};
      // migrate old simple "days" array -> all-day entries
      if(Array.isArray(it.days)) it.days.forEach(d=>{ it.dayTimes[d]={all:true}; });
    }
  }
  if(isRecipe && !it.ingredients) it.ingredients=[];
  if(isOtherCol && !it.locations) it.locations=[];

  if(isChar){ drawRoles(); fillSchedLoc(); drawSched(); }
  if(isComp){ drawCompLevel(); drawFood(); fillCompLoc(); drawDays(); }
  if(isRecipe){ drawIngr(); }
  if(isOtherCol){ drawLoc(); }

  dscrim.classList.add('on'); dsheet.classList.add('on');
}
function closeDetail(){ dsheet.style.transition=''; dsheet.style.transform=''; dscrim.classList.remove('on'); dsheet.classList.remove('on'); _editItem=null; render(); }

/* ---- character role + schedule ---- */
function drawRoles(){
  const w=document.getElementById('roleWrap');
  w.innerHTML=['None',...ROLES].map(r=>{
    const val=(r==='None')?'':r;
    const on=(_editItem.role||'')===val?'on':'';
    return `<button type="button" class="${on}" data-role="${esc(val)}">${esc(r)}</button>`;
  }).join('');
  w.querySelectorAll('[data-role]').forEach(b=>b.onclick=()=>{
    _editItem.role=b.dataset.role; save(); drawRoles();
  });
}
function drawSched(){
  const l=document.getElementById('schedList');
  const s=_editItem.schedule||[];
  if(!s.length){ l.innerHTML=`<div class="schedempty">No schedule yet. Add a location and time below.</div>`; }
  else{
    const fmt=(t)=>{ if(!t) return ''; if(!/^\d{1,2}:\d{2}$/.test(t)) return t; // legacy text like "Morning"
      const [h,m]=t.split(':').map(Number);
      const ap=h<12?'AM':'PM'; let hr=h%12; if(hr===0) hr=12;
      return m? `${hr}:${String(m).padStart(2,'0')} ${ap}` : `${hr} ${ap}`; };
    const sorted=s.map((e,i)=>({e,i})).sort((a,b)=>String(a.e.time||'').localeCompare(String(b.e.time||'')));
    l.innerHTML=sorted.map(({e,i})=>`<div class="schedrow">
      <span class="stime">${esc(fmt(e.time)||'—')}</span>
      <span class="sloc">${esc(e.loc)}</span>
      <button class="srm" data-i="${i}">×</button></div>`).join('');
    l.querySelectorAll('.srm').forEach(b=>b.onclick=()=>{
      _editItem.schedule.splice(+b.dataset.i,1); save(); drawSched();
    });
  }
}
function fillSchedLoc(sel){
  const el=document.getElementById('schedLoc');
  const cur = sel!==undefined ? sel : el.value;
  el.innerHTML = `<option value="">Location…</option>`
    + schedLocations.map(l=>`<option value="${esc(l)}">${esc(l)}</option>`).join('')
    + `<option value="__add">+ Add new location…</option>`;
  if(cur && schedLocations.includes(cur)) el.value=cur;
}
document.getElementById('schedLoc').onchange=function(){
  if(this.value==='__add'){
    const name=(prompt('New location name:')||'').trim();
    if(name){
      if(!schedLocations.includes(name)){ schedLocations.push(name); saveUI(); }
      fillSchedLoc(name);
    } else {
      fillSchedLoc('');
    }
  }
};
document.getElementById('schedAdd').onclick=()=>{
  const loc=document.getElementById('schedLoc').value.trim();
  let time=document.getElementById('schedTime').value;
  if(time && /^\d{2}$/.test(time)) time=time+':00';   // hour dropdown -> HH:00
  if(!loc || loc==='__add'){ toast('Pick a location'); return; }
  _editItem.schedule.push({loc,time}); save();

  drawSched();
};

  });
}
function drawFood(){
  const el=document.getElementById('compFood');
  el.value=_editItem.food||'';
  el.oninput=()=>{ _editItem.food=el.value; save(); };
}
function biomeOptions(exclude){
  const ex=new Set(exclude||[]);
  const all=BIOMES.concat(extraLocations.filter(x=>!BIOMES.includes(x)));
  return `<option value="">Location…</option>`
    + all.filter(b=>!ex.has(b)).map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join('')
    + `<option value="__add">+ Add new location…</option>`;
}
function addCustomLocation(){
  const name=(prompt('New location name:')||'').trim();
  if(!name) return '';
  if(!BIOMES.includes(name) && !extraLocations.includes(name)){ extraLocations.push(name); saveUI(); }
  return name;
}
function fillCompLoc(){
  _editItem.locs = Array.isArray(_editItem.locs)?_editItem.locs:[];
  const sel=document.getElementById('compLoc');
  sel.innerHTML=biomeOptions(_editItem.locs);
  // list of chosen locations
  const l=document.getElementById('compLocList');
  if(!_editItem.locs.length){ l.innerHTML=`<div class="schedempty">No locations yet. Pick one below.</div>`; }
  else{
    l.innerHTML=_editItem.locs.map((loc,i)=>`<div class="schedrow">
      <span class="sloc">${esc(loc)}</span>
      <button class="srm" data-i="${i}">×</button></div>`).join('');
    l.querySelectorAll('.srm').forEach(b=>b.onclick=()=>{
      _editItem.locs.splice(+b.dataset.i,1); save(); fillCompLoc();
    });
  }
}
document.getElementById('compLocAdd').onclick=()=>{
  let v=document.getElementById('compLoc').value;
  if(v==='__add'){ v=addCustomLocation(); if(!v){ fillCompLoc(); return; } }
  if(!v){ toast('Pick a location'); return; }
  _editItem.locs=Array.isArray(_editItem.locs)?_editItem.locs:[];
  if(!_editItem.locs.includes(v)) _editItem.locs.push(v);
  save(); fillCompLoc();
};
const HOURS=Array.from({length:24},(_,h)=>{const ap=h<12?'AM':'PM';let hr=h%12;if(hr===0)hr=12;return [String(h).padStart(2,'0'), hr+' '+ap];});
function hourOpts(selected){
  return HOURS.map(([v,l])=>`<option value="${v}" ${v===selected?'selected':''}>${l}</option>`).join('');
}
function drawDays(){
  const w=document.getElementById('daysWrap');
  const dt=_editItem.dayTimes||(_editItem.dayTimes={});
  w.innerHTML=DAYS.map(([code,lab])=>{
    const e=dt[code];
    const on = !!e;
    const allday = on && e.all;
    const from = (on && !e.all && e.from)? e.from : '08';
    const to   = (on && !e.all && e.to)? e.to : '17';
    return `<div class="dayrow">
      <button type="button" class="daytog ${on?'on':''}" data-dtog="${code}">${lab}</button>
      <button type="button" class="allbtn ${allday?'on':''}" data-dall="${code}" ${on?'':'disabled'}>All day</button>
      <span class="rangewrap ${(!on||allday)?'dim':''}">
        <select class="hsel" data-dfrom="${code}" ${(!on||allday)?'disabled':''}>${hourOpts(from)}</select>
        <span class="dash">–</span>
        <select class="hsel" data-dto="${code}" ${(!on||allday)?'disabled':''}>${hourOpts(to)}</select>
      </span>
    </div>`;
  }).join('');
  // day on/off
  w.querySelectorAll('[data-dtog]').forEach(b=>b.onclick=()=>{
    const d=b.dataset.dtog;
    if(dt[d]) delete dt[d]; else dt[d]={all:true};
    save(); drawDays();
  });
  // all-day toggle
  w.querySelectorAll('[data-dall]').forEach(b=>b.onclick=()=>{
    const d=b.dataset.dall; if(!dt[d]) return;
    if(dt[d].all){ dt[d]={from:'08',to:'17'}; } else { dt[d]={all:true}; }
    save(); drawDays();
  });
  // range selects
  w.querySelectorAll('[data-dfrom]').forEach(s=>s.onchange=()=>{
    const d=s.dataset.dfrom; if(!dt[d]||dt[d].all) return; dt[d].from=s.value; save();
  });
  w.querySelectorAll('[data-dto]').forEach(s=>s.onchange=()=>{
    const d=s.dataset.dto; if(!dt[d]||dt[d].all) return; dt[d].to=s.value; save();
  });
}

/* ---- recipe ingredients ---- */
function drawIngr(){
  const l=document.getElementById('ingrList');
  const s=_editItem.ingredients||[];
  if(!s.length){ l.innerHTML=`<div class="schedempty">No ingredients yet. Add quantity and name below.</div>`; }
  else{
    l.innerHTML=s.map((e,i)=>`<div class="schedrow">
      <span class="qbadge">${esc(e.qty||'1')}</span>
      <span class="sloc">${esc(e.name)}</span>
      <button class="srm" data-i="${i}">×</button></div>`).join('');
    l.querySelectorAll('.srm').forEach(b=>b.onclick=()=>{
      _editItem.ingredients.splice(+b.dataset.i,1); save(); drawIngr();
    });
  }
}
document.getElementById('ingrAdd').onclick=()=>{
  const qty=document.getElementById('ingrQty').value.trim()||'1';
  const name=document.getElementById('ingrName').value.trim();
  if(!name){ toast('Enter an ingredient'); return; }
  _editItem.ingredients.push({qty,name}); save();

/* ---- collectible locations ---- */
function drawLoc(){
  const s=_editItem.locations||(_editItem.locations=[]);
  const sel=document.getElementById('locName');
  sel.innerHTML=biomeOptions(s);
  const l=document.getElementById('locList');
  if(!s.length){ l.innerHTML=`<div class="schedempty">No locations yet. Pick where to find this below.</div>`; }
  else{
    l.innerHTML=s.map((e,i)=>`<div class="schedrow">
      <span class="sloc">${esc(e)}</span>
      <button class="srm" data-i="${i}">×</button></div>`).join('');
    l.querySelectorAll('.srm').forEach(b=>b.onclick=()=>{
      _editItem.locations.splice(+b.dataset.i,1); save(); drawLoc();
    });

}
document.getElementById('locAdd').onclick=()=>{
  let v=document.getElementById('locName').value;
  if(v==='__add'){ v=addCustomLocation(); if(!v){ drawLoc(); return; } }
  if(!v){ toast('Pick a location'); return; }
  _editItem.locations=_editItem.locations||[];
  if(!_editItem.locations.includes(v)) _editItem.locations.push(v);
  save();
  drawLoc();
};

document.getElementById('dClose').onclick=closeDetail;
dscrim.onclick=closeDetail;

/* swipe-down to close the detail sheet */
(function(){
  let startY=0, curY=0, dragging=false;
  const sheet=dsheet;
  function atTop(){ return sheet.scrollTop<=0; }
  sheet.addEventListener('touchstart',e=>{
    if(e.touches.length!==1) return;
    startY=e.touches[0].clientY; curY=startY; dragging=atTop();
  },{passive:true});
  sheet.addEventListener('touchmove',e=>{
    if(!dragging) return;
    curY=e.touches[0].clientY;
    const dy=curY-startY;
    if(dy>0){
      sheet.style.transition='none';
      sheet.style.transform=`translateY(${dy}px)`;
    }
  },{passive:true});
  sheet.addEventListener('touchend',()=>{
    if(!dragging) return;
    dragging=false;
    const dy=curY-startY;
    sheet.style.transition='';
    sheet.style.transform='';
    if(dy>110){ closeDetail(); }
  });
})();

/* data tools */
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),1900);}
function pad2(n){return String(n).padStart(2,'0');}
function drawSyncInfo(){
  const el=document.getElementById('syncinfo');
  if(el){
    let iso=null; try{iso=localStorage.getItem('mkt_last_export');}catch(e){}
    el.textContent = iso ? 'Last backup / import: '+stamp(new Date(iso)) : 'No backup yet — tap Export to save one.';
  }
  // Layer 2: unsaved-changes reminder before an update can wipe storage
  const w=document.getElementById('backupWarn');
  if(w){
    if(hasUnsavedChanges()){
      w.style.display='';
      w.innerHTML='⚠️ <b>You have changes since your last backup.</b> Export now before updating the app or re-adding the icon — an update clears in-app storage.';
    } else {
      w.style.display='none';
    }
  }
}
function stamp(d){ // human-readable local time
  d=d||new Date();
  let h=d.getHours(); const ap=h<12?'AM':'PM'; h=h%12; if(h===0)h=12;
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${h}:${pad2(d.getMinutes())} ${ap}`;
}
function fileStamp(d){ d=d||new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}_${pad2(d.getHours())}${pad2(d.getMinutes())}`;
}
document.getElementById('exp').onclick=()=>{
  const now=new Date();
  const payload={ app:'disney-trackers', savedAt:now.toISOString(), savedAtLabel:stamp(now), data:DB };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`disney-trackers-backup_${fileStamp(now)}.json`;a.click();
  try{localStorage.setItem('mkt_last_export', now.toISOString());}catch(e){}
  try{localStorage.removeItem('mkt_dirty_v1');}catch(e){}
  drawSyncInfo();
  toast('Backup saved · '+stamp(now));
};
document.getElementById('imp').onclick=()=>document.getElementById('file').click();document.getElementById('file').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{try{const raw=JSON.parse(r.result);
    // unwrap timestamped envelope, or accept a raw DB (older backups)
    let d, savedAt=null, label=null;
    if(raw && raw.app==='disney-trackers' && raw.data){ d=raw.data; savedAt=raw.savedAt; label=raw.savedAtLabel; }
    else { d=raw; }
    let ok=false;
    if(d && d.magic_kingdoms && d.dreamlight){ ok=true; }
    else if(d && d.characters && d.attractions){ d={...freshDB(), magic_kingdoms:d}; ok=true; } // old single-game backup
    if(!ok){ toast('Not a valid backup'); e.target.value=''; return; }
    // warn if this backup is older than what's on the device
    const prev=localStorage.getItem('mkt_last_export');
    const when = label || (savedAt? stamp(new Date(savedAt)) : null);
    if(savedAt && prev && new Date(savedAt) < new Date(prev)){
      if(!confirm(`This backup is from ${when}, which looks OLDER than your most recent save (${stamp(new Date(prev))}). Import anyway and overwrite?`)){
        e.target.value=''; return;
      }
    }
    DB=d;
    GAME_ORDER.forEach(g=>{ if(!DB[g]) DB[g]=JSON.parse(JSON.stringify(GAMES[g].data)); });
    if(savedAt){ try{localStorage.setItem('mkt_last_export', savedAt);}catch(e){} }
    save(); try{localStorage.removeItem('mkt_dirty_v1');}catch(e){}
    drawGameSwitch(); drawTabs(); drawChips(); render(); drawSyncInfo();
    toast(when? 'Imported backup from '+when : 'Backup imported');
  }catch(err){toast('Could not read file');}};
  r.readAsText(f); e.target.value='';
};
document.getElementById('restore').onclick=()=>{
  const snaps=getSnapshots();
  if(!snaps.length){ toast('No auto-backups yet — they build up as you make changes'); return; }
  // newest first
  const list=snaps.slice().reverse();
  const lines=list.map((s,idx)=>`${idx+1}. ${s.label}`).join('\n');
  const pick=prompt(`Restore an in-app auto-backup?\n\nThese are automatic snapshots kept on THIS device. Enter a number to restore it (1 = most recent):\n\n${lines}`, '1');
  if(pick===null) return;
  const n=parseInt(pick,10);
  if(isNaN(n) || n<1 || n>list.length){ toast('Enter a number from the list'); return; }
  const chosen=list[n-1];
  if(!confirm(`Restore your data to the snapshot from ${chosen.label}? This replaces your current in-app data (your backup files are untouched).`)) return;
  try{
    DB=JSON.parse(JSON.stringify(chosen.data));
    GAME_ORDER.forEach(g=>{ if(!DB[g]) DB[g]=JSON.parse(JSON.stringify(GAMES[g].data)); });
    save();
    drawGameSwitch(); drawTabs(); drawChips(); render(); drawSyncInfo();
    toast('Restored snapshot from '+chosen.label);
  }catch(e){ toast('Could not restore snapshot'); }
};
document.getElementById('rst').onclick=()=>{
  if(confirm('Reset everything back to the original data? Your changes across both games will be lost.')){
    DB=freshDB(); save(); window._cat='';q='';chip='all';
    Object.keys(collapsed).forEach(k=>delete collapsed[k]); saveUI();
    document.getElementById('q').value='';drawGameSwitch();drawTabs();drawChips();render();toast('Reset to original');}
};
// Force-merge any new built-in items into current data without touching progress
function mergeBuiltins(){
  let added=0;
  GAME_ORDER.forEach(g=>{
    if(!DB[g]) DB[g]=JSON.parse(JSON.stringify(GAMES[g].data));
    GAMES[g].sections.forEach(([sec])=>{
      if(!Array.isArray(DB[g][sec])) DB[g][sec]=[];
      const have=new Set(DB[g][sec].map(it=>it.name+'|'+it.category));
      (GAMES[g].data[sec]||[]).forEach(it=>{
        if(!have.has(it.name+'|'+it.category)){ DB[g][sec].push(JSON.parse(JSON.stringify(it))); added++; }
      });
    });
  });
  return added;
}
document.getElementById('sync').onclick=()=>{
  const n=mergeBuiltins();
  save(); drawGameSwitch(); drawTabs(); drawChips(); render();
  toast(n? `Synced — added ${n} new item${n>1?'s':''}` : 'Already up to date');
};

// apply restored UI state and draw
document.getElementById('kicker').textContent='Disney '+GAMES[game].label;
document.getElementById('q').value = q;
drawGameSwitch(); drawTabs(); drawChips(); render(); drawSyncInfo();

/* offline service worker (caches this page) */
if('serviceWorker' in navigator){
  const sw=`self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('activate',e=>self.clients.claim());
self.addEventListener('fetch',e=>{e.respondWith(
  caches.open('mkt').then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(resp=>{
    if(e.request.method==='GET'){c.put(e.request,resp.clone());} return resp;}).catch(()=>caches.match('/')))) );});`;
  const url=URL.createObjectURL(new Blob([sw],{type:'text/javascript'}));
  navigator.serviceWorker.register(url).catch(()=>{});
}
